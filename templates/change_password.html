<!DOCTYPE html>
<html lang="{{ ui_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t('profile.password') }} | {{ t('app.name') }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 18px;
            font-family: "Manrope", sans-serif;
            background: linear-gradient(135deg, #efe7da 0%, #f8f4ee 46%, #eef4f7 100%);
        }
        form {
            width: min(420px, 100%);
            padding: 28px;
            border-radius: 24px;
            background: rgba(255, 252, 247, 0.94);
            box-shadow: 0 24px 70px rgba(23, 33, 43, 0.14);
            display: grid;
            gap: 14px;
        }
        label { display: grid; gap: 8px; font-weight: 700; }
        input, button { font: inherit; }
        input {
            width: 100%;
            border-radius: 14px;
            border: 1px solid rgba(23, 33, 43, 0.12);
            padding: 13px 14px;
        }
        button {
            border: none;
            border-radius: 14px;
            padding: 13px 16px;
            background: linear-gradient(135deg, #146c94 0%, #0f4e6c 100%);
            color: white;
            font-weight: 800;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <form method="post">
        <h1>{{ t('profile.password') }}</h1>
        <label>
            {{ t('profile.current_password') }}
            <input name="old_password" type="password" required>
        </label>
        <label>
            {{ t('profile.new_password') }}
            <input name="new_password" type="password" required>
        </label>
        <button type="submit">{{ t('profile.password') }}</button>
    </form>
</body>
</html>

<!DOCTYPE html>
<html lang="{{ ui_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t('ban.title') }} | {{ t('app.name') }}</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 18px;
            font-family: "Manrope", sans-serif;
            background: linear-gradient(135deg, #1a2028 0%, #6b2015 100%);
            color: white;
        }
        .card {
            width: min(520px, 100%);
            padding: 28px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 28px 60px rgba(0, 0, 0, 0.28);
            backdrop-filter: blur(18px);
        }
        h1 { margin-top: 0; }
        p { line-height: 1.6; color: rgba(255, 255, 255, 0.82); }
        a {
            display: inline-block;
            margin-top: 12px;
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.12);
            padding: 12px 14px;
            border-radius: 14px;
        }
    </style>
</head>
<body>
    <section class="card">
        <h1>{{ t('ban.title') }}</h1>
        <p><strong>{{ t('ban.reason') }}:</strong> {{ ban_reason }}</p>
        {% if ban_until %}
        <p><strong>{{ t('ban.until') }}:</strong> {{ ban_until }}</p>
        {% endif %}
        <a href="{{ url_for('login') }}">{{ t('ban.back') }}</a>
    </section>
</body>
</html>

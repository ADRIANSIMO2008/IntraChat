<!DOCTYPE html>
<html lang="{{ ui_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t('add.title') }} | {{ t('app.name') }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f4efe7;
            --panel: rgba(255, 252, 247, 0.92);
            --ink: #17212b;
            --muted: #60707a;
            --line: rgba(23, 33, 43, 0.12);
            --brand: #146c94;
            --brand-dark: #0f4e6c;
            --shadow: 0 24px 70px rgba(23, 33, 43, 0.14);
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 20px;
            font-family: "Manrope", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(20, 108, 148, 0.18), transparent 30%),
                radial-gradient(circle at bottom right, rgba(204, 122, 0, 0.16), transparent 24%),
                linear-gradient(135deg, #efe7da 0%, #f8f4ee 46%, #eef4f7 100%);
        }

        .card {
            width: min(520px, 100%);
            background: var(--panel);
            border: 1px solid rgba(255, 255, 255, 0.48);
            border-radius: 28px;
            padding: 30px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
        }

        .eyebrow {
            margin: 0 0 8px;
            font: 500 0.78rem "IBM Plex Mono", monospace;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--brand);
        }

        h1 {
            margin: 0 0 10px;
            font-size: 2rem;
        }

        p {
            margin: 0 0 24px;
            color: var(--muted);
            line-height: 1.6;
        }

        form {
            display: grid;
            gap: 16px;
        }

        label {
            display: grid;
            gap: 8px;
            font-weight: 700;
        }

        input,
        select,
        button,
        a {
            font: inherit;
        }

        input,
        select {
            width: 100%;
            border-radius: 16px;
            border: 1px solid var(--line);
            padding: 14px 15px;
            background: white;
        }

        .actions {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }

        .ghost,
        .primary {
            text-decoration: none;
            border: none;
            border-radius: 16px;
            padding: 14px 18px;
            cursor: pointer;
        }

        .ghost {
            background: rgba(23, 33, 43, 0.06);
            color: var(--ink);
        }

        .primary {
            background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
            color: white;
            box-shadow: 0 18px 34px rgba(20, 108, 148, 0.22);
        }

        @media (max-width: 560px) {
            .card { padding: 22px; }
            .actions { flex-direction: column; }
        }
    </style>
</head>
<body>
    <section class="card">
        <p class="eyebrow">Admin</p>
        <h1>{{ t('add.title') }}</h1>
        <p>{{ t('add.subtitle') }}</p>

        <form method="post">
            <label>
                {{ t('add.username') }}
                <input name="username" type="text" required>
            </label>
            <label>
                {{ t('add.password') }}
                <input name="password" type="password" required>
            </label>
            <label>
                {{ t('add.display_name') }}
                <input name="display_name" type="text">
            </label>
            <label>
                {{ t('add.rank') }}
                <input name="rank" type="text">
            </label>
            <label>
                {{ t('add.language') }}
                <select name="language">
                    {% for code, name in available_languages.items() %}
                    <option value="{{ code }}">{{ name }}</option>
                    {% endfor %}
                </select>
            </label>
            <div class="actions">
                <a class="ghost" href="{{ url_for('chat') }}">{{ t('add.back') }}</a>
                <button class="primary" type="submit">{{ t('add.submit') }}</button>
            </div>
        </form>
    </section>
</body>
</html>

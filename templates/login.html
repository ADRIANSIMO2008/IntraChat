<!DOCTYPE html>
<html lang="{{ ui_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t('login.title') }} | {{ t('app.name') }}</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('brand_logo', variant='mark') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f4efe7;
            --panel: rgba(253, 251, 247, 0.92);
            --ink: #17212b;
            --muted: #5e6b75;
            --line: rgba(23, 33, 43, 0.12);
            --brand: #146c94;
            --brand-dark: #0f4e6c;
            --accent: #cc7a00;
            --danger: #c0392b;
            --shadow: 0 24px 70px rgba(23, 33, 43, 0.14);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: "Manrope", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(20, 108, 148, 0.18), transparent 32%),
                radial-gradient(circle at bottom right, rgba(204, 122, 0, 0.18), transparent 28%),
                linear-gradient(135deg, #efe7da 0%, #f9f5ef 44%, #eef4f7 100%);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .shell {
            width: min(1040px, 100%);
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            background: var(--panel);
            border: 1px solid rgba(255, 255, 255, 0.65);
            box-shadow: var(--shadow);
            border-radius: 28px;
            overflow: hidden;
            backdrop-filter: blur(20px);
        }

        .story {
            position: relative;
            padding: 48px;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.36), rgba(255, 255, 255, 0.08)),
                linear-gradient(160deg, #0f4e6c 0%, #146c94 45%, #1b8abf 100%);
            color: #f8fbfd;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 560px;
        }

        .story::after {
            content: "";
            position: absolute;
            inset: auto -12% -18% auto;
            width: 280px;
            height: 280px;
            border-radius: 32px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.22), rgba(255, 255, 255, 0));
            transform: rotate(18deg);
        }

        .brand {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            gap: 14px;
            font-family: "IBM Plex Mono", monospace;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .brand-mark {
            width: 56px;
            height: 56px;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 16px 28px rgba(8, 21, 31, 0.18);
        }

        .brand-icon,
        .hero-wordmark {
            display: block;
            width: 100%;
            height: auto;
        }

        .hero-wordmark {
            width: min(100%, 360px);
        }

        .copy {
            position: relative;
            z-index: 1;
            display: grid;
            gap: 18px;
            max-width: 420px;
        }

        .copy h1 {
            font-size: clamp(2.4rem, 4vw, 4rem);
            line-height: 0.96;
            font-weight: 800;
        }

        .copy p {
            color: rgba(248, 251, 253, 0.82);
            font-size: 1rem;
            line-height: 1.7;
        }

        .chips {
            position: relative;
            z-index: 1;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .chip {
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.14);
            border: 1px solid rgba(255, 255, 255, 0.18);
            font-size: 0.9rem;
        }

        .panel {
            padding: 34px;
            display: flex;
            flex-direction: column;
            gap: 22px;
            justify-content: center;
        }

        .lang-bar {
            display: flex;
            justify-content: flex-end;
        }

        .lang-form {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .lang-form select {
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 10px 12px;
            background: white;
            font: inherit;
            color: var(--ink);
        }

        .login-card {
            display: grid;
            gap: 18px;
        }

        .eyebrow {
            font-family: "IBM Plex Mono", monospace;
            color: var(--brand);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-size: 0.82rem;
        }

        .login-card h2 {
            font-size: 2rem;
            line-height: 1.05;
        }

        .login-card p {
            color: var(--muted);
            line-height: 1.6;
        }

        form {
            display: grid;
            gap: 16px;
        }

        .field {
            display: grid;
            gap: 8px;
        }

        label {
            font-size: 0.95rem;
            font-weight: 700;
        }

        input {
            width: 100%;
            border: 1px solid var(--line);
            background: white;
            border-radius: 16px;
            padding: 14px 16px;
            font: inherit;
            color: var(--ink);
            transition: border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: rgba(20, 108, 148, 0.55);
            box-shadow: 0 0 0 4px rgba(20, 108, 148, 0.12);
            transform: translateY(-1px);
        }

        .remember {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .remember input {
            width: 18px;
            height: 18px;
            accent-color: var(--brand);
        }

        .submit {
            border: none;
            border-radius: 18px;
            padding: 15px 20px;
            font: inherit;
            font-weight: 800;
            background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
            color: white;
            cursor: pointer;
            box-shadow: 0 18px 34px rgba(20, 108, 148, 0.22);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 38px rgba(20, 108, 148, 0.28);
        }

        .error {
            padding: 13px 14px;
            border-radius: 14px;
            background: rgba(192, 57, 43, 0.1);
            color: var(--danger);
            border: 1px solid rgba(192, 57, 43, 0.18);
            font-size: 0.95rem;
        }

        @media (max-width: 860px) {
            .shell {
                grid-template-columns: 1fr;
            }

            .story {
                min-height: 320px;
                padding: 34px;
            }

            .panel {
                padding: 28px;
            }
        }

        @media (max-width: 560px) {
            body {
                padding: 14px;
            }

            .story,
            .panel {
                padding: 24px;
            }

            .copy h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="shell">
        <section class="story">
            <div class="brand">
                <div class="brand-mark">
                    <img class="brand-icon" src="{{ url_for('brand_logo', variant='mark') }}" alt="{{ app_name }} mark">
                </div>
                <span>IntraChat ver. {{ version }}</span>
            </div>
            <div class="copy">
                <span class="eyebrow">Rooms + PM</span>
                <img class="hero-wordmark" src="{{ url_for('brand_logo', variant='wordmark') }}" alt="{{ app_name }} logo">
                <p>{{ t('login.subtitle') }}</p>
            </div>
            <div class="chips">
                <span class="chip">General</span>
                <span class="chip">PM</span>
                <span class="chip"><span>{{ t('app.name') }}</span></span>
                <span class="chip">Multi-Lang</span>
            </div>
        </section>

        <section class="panel">
            <div class="lang-bar">
                <form class="lang-form" method="post" action="{{ url_for('set_language') }}">
                    <label for="language">{{ t('nav.language') }}</label>
                    <input type="hidden" name="next" value="{{ request.path }}">
                    <select id="language" name="language" onchange="this.form.submit()">
                        {% for code, name in available_languages.items() %}
                        <option value="{{ code }}" {% if code == ui_language %}selected{% endif %}>{{ name }}</option>
                        {% endfor %}
                    </select>
                </form>
            </div>

            <div class="login-card">
                <span class="eyebrow">Secure Access</span>
                <h2>{{ t('login.title') }}</h2>
                <p>{{ t('login.subtitle') }}</p>
                {% if error %}
                <div class="error">{{ error }}</div>
                {% endif %}
                <form method="post" action="{{ url_for('login') }}">
                    <input type="hidden" name="next" value="{{ next_url }}">
                    <div class="field">
                        <label for="username">{{ t('login.username') }}</label>
                        <input id="username" name="username" type="text" autocomplete="username" required>
                    </div>
                    <div class="field">
                        <label for="password">{{ t('login.password') }}</label>
                        <input id="password" name="password" type="password" autocomplete="current-password" required>
                    </div>
                    <label class="remember" for="remember">
                        <input id="remember" name="remember" type="checkbox">
                        <span>{{ t('login.remember') }}</span>
                    </label>
                    <button class="submit" type="submit">{{ t('login.submit') }}</button>
                </form>
            </div>
        </section>
    </div>
</body>
</html>
